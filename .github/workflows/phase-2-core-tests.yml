name: Phase 2 — Core E2E Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phase-2-core-tests:
    name: Run Phase 2 core E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Phase 2 core tests
        env:
          SKILLTREE_TEST_ARTIFACTS_DIR: tests/results
          SKILLTREE_E2E_EXPORT_DIR: tests/results/e2e-exports
          SKILLTREE_E2E_METRICS_DIR: tests/results/e2e-metrics
        run: npm run test:phase2

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            tests/results/**
